# Production overrides (`inngest` prod mode, `redis`, observability, Drizzle).

services:
  postgres:
    environment:
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?required}

  redis:
    image: redis:8.6.1-alpine3.23
    command:
      - redis-server
      - '--appendonly'
      - 'yes'
    volumes:
      - redis:/data
    networks:
      - queue
    restart: always
    healthcheck:
      test:
        - 'CMD'
        - 'redis-cli'
        - 'ping'
      interval: 5s
      timeout: 3s
      retries: 5

  inngest:
    command:
      - inngest
      - start
      - '--sqlite-dir'
      - '/app'
      - '--sdk-url'
      - 'http://host.docker.internal:4173/api/inngest'
    environment:
      INNGEST_EVENT_KEY: ${INNGEST_EVENT_KEY:?required}
      INNGEST_SIGNING_KEY: ${INNGEST_SIGNING_KEY:?required}
      INNGEST_REDIS_URI: redis://redis:6379
    volumes:
      - inngest:/app
    depends_on:
      redis:
        condition: service_healthy
        required: true

  o2:
    environment:
      ZO_ROOT_USER_EMAIL: ${ZO_ROOT_USER_EMAIL:?required}
      ZO_ROOT_USER_PASSWORD: ${ZO_ROOT_USER_PASSWORD:?required}

  rustfs:
    environment:
      RUSTFS_ACCESS_KEY: ${S3_ACCESS_KEY:?required}
      RUSTFS_SECRET_KEY: ${S3_SECRET_KEY:?required}

  setup-bucket:
    environment:
      MC_HOST_drap: http://${S3_ACCESS_KEY:?required}:${S3_SECRET_KEY:?required}@rustfs:9000

  drizzle-gateway:
    image: ghcr.io/drizzle-team/gateway:1.2.0
    ports:
      - host_ip: 127.0.0.1
        published: 4983
        target: 4983
        protocol: tcp
    environment:
      PORT: 4983
      STORE_PATH: /app
      MASTERPASS: ${DRIZZLE_MASTERPASS:?required}
    volumes:
      - drizzle-gateway:/app
    networks:
      - database
    restart: always

volumes:
  redis:
  inngest:
  drizzle-gateway:
