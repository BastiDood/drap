# Production overrides (observability, Drizzle, backup service, production credentials).

services:
  databasus:
    pull_policy: build
    build: ./docker/databasus
    ports:
      - host_ip: 127.0.0.1
        published: 4005
        target: 4005
        protocol: tcp
    volumes:
      - databasus-data:/databasus-data
    networks:
      - database
    restart: always
    healthcheck:
      test:
        - 'CMD'
        - '/httpget'
        - 'http://127.0.0.1:4005/api/v1/system/health'
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 30s
      start_interval: 1s

  drizzle-gateway:
    image: ghcr.io/drizzle-team/gateway:1.3.0
    ports:
      - host_ip: 127.0.0.1
        published: 4983
        target: 4983
        protocol: tcp
    environment:
      PORT: 4983
      STORE_PATH: /app
      MASTERPASS: ${DRIZZLE_MASTERPASS:?required}
      POSTGRES_URL: postgresql://postgres:${POSTGRES_PASSWORD:?required}@postgres
    volumes:
      - drizzle-gateway:/app
    networks:
      - database
    restart: always

  o2:
    environment:
      ZO_ROOT_USER_EMAIL: ${ZO_ROOT_USER_EMAIL:?required}
      ZO_ROOT_USER_PASSWORD: ${ZO_ROOT_USER_PASSWORD:?required}

  postgres:
    environment:
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?required}

  rustfs:
    environment:
      RUSTFS_ACCESS_KEY: ${S3_ACCESS_KEY:?required}
      RUSTFS_SECRET_KEY: ${S3_SECRET_KEY:?required}

  setup-bucket:
    environment:
      MC_HOST_drap: http://${S3_ACCESS_KEY:?required}:${S3_SECRET_KEY:?required}@rustfs:9000

volumes:
  databasus-data:
  drizzle-gateway:
