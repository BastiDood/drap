# Development overrides (`inngest` dev mode, dev credentials).

services:
  postgres:
    environment:
      # Development-only credentials!
      POSTGRES_PASSWORD: password

  inngest:
    command:
      - inngest
      - dev
      - '--no-discovery'
      - '--sdk-url'
      - 'http://host.docker.internal:5173/api/inngest' # Vite

  rustfs:
    environment:
      # Development-only credentials!
      RUSTFS_ACCESS_KEY: drap
      RUSTFS_SECRET_KEY: password

  setup-bucket:
    environment:
      MC_HOST_drap: http://drap:password@rustfs:9000
