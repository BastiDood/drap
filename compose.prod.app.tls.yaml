# TLS ingress overlay for compose.prod.app.yaml.

services:
  haproxy:
    ports:
      - host_ip: 0.0.0.0
        published: 443
        target: 443
        protocol: tcp
      - host_ip: 0.0.0.0
        published: 443
        target: 443
        protocol: udp
    secrets:
      - source: certificate
        target: certificate.pem

secrets:
  certificate:
    file: ./certificate.pem
