global
    log stdout format raw local0
    zero-warning

.if !defined(SCHEME)
    .alert "SCHEME is required"
.elif !streq("$SCHEME",http) && !streq("$SCHEME",https)
    .alert "SCHEME must be http or https"
.endif

.if streq("$SCHEME",https) && !feature(OPENSSL)
    .alert "SCHEME=https requires OpenSSL support"
.endif

defaults
    log global
    mode http
    option httplog
    option dontlognull
    timeout connect 5s
    timeout client 30s
    timeout server 30s
    timeout http-request 10s

cache public_cache
    total-max-size 32
    max-object-size 1048576
    max-age 31536000
    process-vary on

listen app
    bind :80
    .if streq("$SCHEME",https)
    bind :443 ssl crt /run/secrets/certificate.pem alpn h2,http/1.1
    .endif
    option forwardfor

    acl host_allowed hdr(host) -i "${HOST}"
    acl blocked_ip src -f /usr/local/etc/haproxy/external.lst
    acl too_many_requests sc_http_req_rate(0) gt 120
    acl allowed_root path -i /
    acl allowed_static_file path -i /drap-logo.png /favicon.ico /robots.txt
    acl allowed_path path_beg -f /usr/local/etc/haproxy/allowed-paths.lst

    stick-table type ip size 100k expire 60s store http_req_rate(10s)
    http-request track-sc0 src

    http-request return status 404 if !host_allowed
    http-request return status 404 if blocked_ip
    .if streq("$SCHEME",https)
    http-request redirect scheme https code 301 if !{ ssl_fc }
    .endif
    http-request return status 404 if !allowed_root !allowed_static_file !allowed_path
    http-request return status 429 hdr Retry-After 60 if too_many_requests

    http-request set-header X-Real-IP %[src]
    http-request set-header X-Forwarded-Proto http
    http-request set-header X-Forwarded-Proto https if { ssl_fc }

    acl response_is_html res.hdr(Content-Type) -m beg text/html
    acl prerendered_html path -i / /privacy /privacy/
    acl aggressive_cache path -i / /privacy/ /drap-logo.png /favicon.ico /robots.txt
    acl immutable_assets path_beg /_app/immutable/

    http-request cache-use public_cache if METH_GET aggressive_cache
    http-request cache-use public_cache if METH_GET immutable_assets

    http-after-response set-header X-Content-Type-Options nosniff
    http-after-response set-header Referrer-Policy strict-origin-when-cross-origin
    http-after-response set-header X-Frame-Options DENY
    http-after-response add-header Content-Security-Policy "frame-ancestors 'none'" if response_is_html prerendered_html
    .if streq("$SCHEME",https)
    http-after-response set-header Strict-Transport-Security "max-age=31536000" if { ssl_fc }
    .endif
    http-response set-header Cache-Control "public, max-age=86400, s-maxage=86400, stale-while-revalidate=86400" if aggressive_cache
    http-response cache-store public_cache if { status 200 } aggressive_cache
    http-response cache-store public_cache if { status 200 } immutable_assets

    server app app:3000 check
